# ─── EduIgnite — Nginx Frontend + API Routing Config ─────────────────────────
# Placed at /etc/nginx/conf.d/frontend.conf inside the nginx container.
# Handles:
#   - Next.js frontend  (upstream: frontend:3000)
#   - Django API        (upstream: web:8000)      via /api/
#   - Django Admin      (upstream: web:8000)      via /admin/
#   - WebSocket (chat)  (upstream: channels:8001) via /ws/
#   - Static/Media      served from mounted volumes
#
# SSL: Uncomment the HTTPS server block and supply certs in nginx/ssl/

upstream nextjs {
    server frontend:3000;
    keepalive 32;
}

upstream django {
    server web:8000;
    keepalive 16;
}

upstream channels {
    server channels:8001;
    keepalive 8;
}

# ── HTTP → HTTPS redirect (enable once SSL certs are in place) ──────────────
# server {
#     listen 80;
#     server_name yourdomain.com www.yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;
    server_name _;

    # SSL (uncomment when certs are ready)
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 1d;

    # ── Static assets (Django collectstatic output) ─────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── User-uploaded media files ────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── WebSocket connections (Django Channels / chat) ───────────────────────
    location /ws/ {
        proxy_pass http://channels;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 7d;
        proxy_send_timeout    7d;
        proxy_read_timeout    7d;
        proxy_buffering       off;
    }

    # ── Django REST API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://django;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;

        # Allow larger request bodies (file uploads)
        client_max_body_size 50M;
    }

    # ── Django Admin ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://django;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Health check endpoint (bypass logging) ───────────────────────────────
    location = /api/health/ {
        proxy_pass http://django;
        access_log off;
    }

    # ── Next.js — API routes & RSC payload ──────────────────────────────────
    location /_next/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache Next.js static chunks aggressively (they're content-hashed)
        location /_next/static/ {
            proxy_pass http://nextjs;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Everything else → Next.js ────────────────────────────────────────────
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        proxy_buffering off;
    }

    # ── Security: deny hidden files (.env, .git, etc.) ───────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
