# ─── EduIgnite — Full-Stack Production Docker Compose ────────────────────────
# Usage:
#   1. Copy backend/.env.example to backend/.env and fill in all values
#   2. Set NEXT_PUBLIC_API_URL to your public domain (e.g. https://api.yourdomain.com/api/v1)
#   3. Run: docker compose -f docker-compose.prod.yml up -d --build

version: '3.9'

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-eduignite}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Redis Cache & Message Broker ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Django Backend (Gunicorn) ───────────────────────────────────────────────
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    entrypoint: ["/app/docker/entrypoint.sh"]
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4", "--timeout", "120"]
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend

  # ── Django Channels (Daphne — WebSockets) ───────────────────────────────────
  channels:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/1
    command: ["daphne", "-b", "0.0.0.0", "-p", "8001", "config.asgi:application"]
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      - web
    networks:
      - backend
      - frontend

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency", "4"]
    depends_on:
      - db
      - redis
    networks:
      - backend

  # ── Celery Beat (Scheduled Tasks) ───────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: ["celery", "-A", "config", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    depends_on:
      - db
      - redis
    networks:
      - backend

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.yourdomain.com/api/v1}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-EduIgnite}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://yourdomain.com}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - frontend

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/frontend.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro   # Mount your SSL certs here
    depends_on:
      - web
      - channels
      - frontend
    networks:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
